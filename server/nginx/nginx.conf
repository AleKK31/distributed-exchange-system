upstream sv_usuarios {
    server sv-usuarios:3001;
}

upstream sv_publicacoes {
    server sv-publicacoes:3002;
}

upstream sv_match {
    server sv-match:3003;
}

upstream sv_notificacao {
    server sv-notificacao:3004;
}

server {
    listen 80;
    server_name localhost;

    # Usuários e autenticação (JWT, login, cadastro, perfil)
    location /api/usuarios {
        proxy_pass http://sv_usuarios;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth {
        proxy_pass http://sv_usuarios;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Publicações (itens para troca)
    location /api/publicacoes {
        proxy_pass http://sv_publicacoes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Match (aceitar/recusar propostas)
    location /api/match {
        proxy_pass http://sv_match;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Notificação via WebSocket (socket.io)
    location /socket.io {
        proxy_pass http://sv_notificacao;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
